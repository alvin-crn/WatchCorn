security:
    password_hashers:
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern:  ^/login_check$
            stateless: true
            json_login:
                check_path: /login_check
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        public:
            pattern: ^/(register|verify-email|send-email-verification)
            stateless: true
            security: false

        api:
            pattern:   ^/
            stateless: true
            provider: app_user_provider
            jwt: ~
            lazy: true

    access_control:
        # Auth & inscription → accès public
        - { path: ^/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/auth/refreshToken, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/verify-email, roles: PUBLIC_ACCESS }
        - { path: ^/send-email-verification, roles: PUBLIC_ACCESS }

        # Gestion des abonnements → JWT requis
        - { path: ^/user/(follow|unfollow)$, roles: IS_AUTHENTICATED_FULLY }

        # Recherche & contenu public → accès public
        - { path: ^/user/[^/]+$, roles: PUBLIC_ACCESS }
        - { path: ^/tmdb, roles: PUBLIC_ACCESS }

        # Tout le reste de l’API → JWT requis
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
